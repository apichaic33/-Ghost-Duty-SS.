<!DOCTYPE html>

<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <?!= include('Styles'); ?>
  <style>
    /* Loading overlay */
    #loadingOverlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0d47a1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    }
    #loadingOverlay.fade-out { opacity: 0; pointer-events: none; }

    .loader-logo {
      font-size: 3rem; color: white;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loader-title {
      color: white; font-weight: 700;
      font-size: 1.3rem; margin-top: 16px; letter-spacing: 0.5px;
    }
    .loader-subtitle {
      color: rgba(255,255,255,0.65);
      font-size: 0.85rem; margin-top: 6px;
    }
    .loader-track {
      width: 220px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px; margin-top: 28px; overflow: hidden;
    }
    .loader-fill {
      height: 100%; width: 0%;
      background: white; border-radius: 99px;
      transition: width 0.3s ease;
    }
    .loader-dots { display: flex; gap: 8px; margin-top: 20px; }
    .loader-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.5);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    .loader-step {
      color: rgba(255,255,255,0.55);
      font-size: 0.78rem; margin-top: 14px;
      min-height: 18px; letter-spacing: 0.3px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); background: rgba(255,255,255,0.4); }
      40% { transform: translateY(-8px); background: white; }
    }
  </style>
</head>
<body>

<!-- ===== Loading Overlay ===== -->
<div id="loadingOverlay">

  <div class="loader-logo">
    <? if (page === "coupon") { ?>
      <i class="bi bi-journal-check"></i>
    <? } else if (page === "passenger") { ?>
      <i class="bi bi-people-fill"></i>
    <? } else if (page === "tasks") { ?>
      <i class="bi bi-clipboard2-check"></i>
    <? } else if (page === "ogs") { ?>
      <i class="bi bi-calendar2-x"></i>
    <? } else if (page === "employee") { ?>
      <i class="bi bi-person-badge"></i>
    <? } else if (page === "shift") { ?>
      <i class="bi bi-calendar3-week" style="color:#ea580c;"></i>
    <? } else { ?>
      <i class="bi bi-grid-3x3-gap-fill"></i>
    <? } ?>
  </div>

  <div class="loader-title">
    <? if (page === "coupon") { ?>
      คูปองพิเศษ
    <? } else if (page === "passenger") { ?>
      ยอดผู้โดยสาร
    <? } else if (page === "tasks") { ?>
      บันทึกและติดตามงาน
    <? } else if (page === "ogs") { ?>
      OGS
    <? } else if (page === "employee") { ?>
      ข้อมูลพนักงาน
    <? } else if (page === "shift") { ?>
      ยำกะผี
    <? } else { ?>
      ระบบจัดการสถานี
    <? } ?>
  </div>

  <div class="loader-subtitle">กำลังโหลด...</div>
  <div class="loader-track">
    <div class="loader-fill" id="loaderFill"></div>
  </div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
  <div class="loader-step" id="loaderStep">กำลังเชื่อมต่อระบบ...</div>

</div>
<!-- ========================== -->

<nav class="navbar navbar-dark shadow-sm mb-4" style="background:#0d47a1;">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-bold fs-5">
      <i class="bi bi-grid-3x3-gap-fill me-2"></i>ระบบจัดการสถานี
      <? if (page === "shift" && pos) { ?>
        <? var posNames = { 'SS': 'นายสถานี', 'AStS': 'ผู้ช่วยนายสถานี', 'SP': 'เจ้าหน้าที่สถานี' }; ?>
        <? var posColors = { 'SS': '#ea580c', 'AStS': '#0891b2', 'SP': '#7c3aed' }; ?>
        <span class="badge ms-2 fw-semibold" style="background:<?= posColors[pos] || '#6b7280' ?>; font-size:.7rem; vertical-align:middle; border-radius:20px; padding:4px 10px;">
          <?= pos ?> — <?= posNames[pos] || pos ?>
        </span>
      <? } ?>
    </span>
    <? if (page !== "home") { ?>
    <div>
      <a href="<?= baseUrl ?>" id="btnNavHome" class="btn btn-outline-light btn-sm" onclick="transformToLoader()">
        <i class="bi bi-house-fill me-1"></i>หน้าหลัก

    <script>
      function transformToLoader() {
        var btn = document.getElementById('btnNavHome');

          btn.style.pointerEvents = 'none';
          btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>กำลังกลับ...';
        }
      }

</nav>

  <? } else if (page === "passenger") { ?>

  <? } else if (page === "tasks") { ?>
    <?!= include('TaskApp'); ?>
  <? } else if (page === "ogs") { ?>

  <? } else if (page === "employee") { ?>

  <? } ?>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // ===== Loading sequence =====
  var _fill    = document.getElementById('loaderFill');
  var _step    = document.getElementById('loaderStep');
  var _overlay = document.getElementById('loadingOverlay');

  var _steps = [
    { pct:  20, text: 'กำลังโหลดสไตล์...' },
    { pct:  45, text: 'กำลังโหลดโมดูล...' },
    { pct:  70, text: 'กำลังเชื่อมต่อข้อมูล...' },
    { pct:  90, text: 'เกือบเสร็จแล้ว...' },
    { pct: 100, text: 'พร้อมใช้งาน!' }
  ];

  var _si = 0;
  var _timer = setInterval(function() {
    if (_si >= _steps.length) { clearInterval(_timer); return; }
    _fill.style.width = _steps[_si].pct + '%';
    _step.innerText   = _steps[_si].text;
    _si++;
  }, 320);

  window.addEventListener('load', function() {
    clearInterval(_timer);
    _fill.style.width = '100%';
    _step.innerText   = 'พร้อมใช้งาน!';
    setTimeout(function() {
      _overlay.classList.add('fade-out');
      setTimeout(function() { _overlay.style.display = 'none'; }, 420);
    }, 300);
  });

  function goTo(p) {
    var base = window.location.href.split('?')[0];
    window.location.href = base + '?p=' + p;
  }
</script>

</body>
</html>
