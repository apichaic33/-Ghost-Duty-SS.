<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <base href="/" />
    <title>ระบบยำกะผี (Yum Ka Phi)</title>
    <script>
      // Redirect if on GitHub Pages (stuck from previous deployment)
      if (window.location.hostname.includes('github.io')) {
        const aiStudioUrl = 'https://ais-dev-eiw3tx47esa2yoowgi32pi-305715865908.asia-southeast1.run.app';
        window.location.href = aiStudioUrl;
      }

      // Unregister all service workers to clear potential leftovers from GitHub Pages
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(() => {
              console.log('Service worker unregistered');
              // Force reload after unregistering to ensure clean state
              window.location.reload();
            });
          }
        });
      }

      // Prevent zooming via keyboard shortcuts (Ctrl + / - / 0)
      document.addEventListener('keydown', function(event) {
        if (event.ctrlKey === true || event.metaKey === true) {
          if (event.key === '+' || event.key === '-' || event.key === '=' || event.key === '0') {
            event.preventDefault();
          }
        }
      });

      // Prevent zooming via mouse wheel (Ctrl + Wheel)
      document.addEventListener('wheel', function(event) {
        if (event.ctrlKey === true || event.metaKey === true) {
          event.preventDefault();
        }
      }, { passive: false });

      // Prevent double-tap to zoom on mobile
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(event) {
        let now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
          event.preventDefault();
        }
        lastTouchEnd = now;
      }, false);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
